<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>消防设施操作员内部报名资质审核</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

html, body{
    width: 100%;
    min-height: 100vh;
    font-family:"Microsoft YaHei",sans-serif;
    background-image: url('https://img0.baidu.com/it/u=513666866,3794590910&fm=253&fmt=auto&app=120&f=JPEG?w=1204&h=800');
    background-repeat: no-repeat;
    background-position: center center;
    background-size: cover;
    background-attachment: fixed;
    padding: 20px 10px;
    position: relative;
}
body::before {
    content: "";
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.5);
    z-index: 1;
    pointer-events: none;
}

.card{
    max-width:520px;
    margin: 0 auto 30px;
    background:rgba(255,255,255,0.97);
    border-radius:20px;
    overflow:hidden;
    position:relative;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    z-index: 10;
}

.header{
    padding:26px 24px;
    text-align:center;
}
.header h2{
    font-size:26px;
    font-weight:700;
    color:#d90000;
    letter-spacing:1.5px;
}

.form-body{
    padding:30px 30px 40px;
}
.form-item{
    margin-bottom:22px;
}
.form-item label{
    display:block;
    font-size:16px;
    color:#333;
    margin-bottom:8px;
    font-weight:500;
}
.form-item input, .form-item select{
    width:100%;
    height:48px;
    padding:0 15px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:16px;
    background:#fff;
    transition: border 0.3s;
}
.form-item input:focus, .form-item select:focus{
    outline: none;
    border-color: #165DFF;
}
.submit-btn{
    width:100%;
    height:52px;
    background:#165DFF;
    color:#fff;
    border:none;
    border-radius:14px;
    font-size:18px;
    margin-top:10px;
    cursor:pointer;
    transition:all 0.3s;
    font-weight: 500;
}
.submit-btn:hover{
    background:#0f4cd1;
    transform: translateY(-2px);
}

.result-body{
    padding:30px;
    display:none;
}
.result-title{
    text-align:center;
    font-size:26px;
    margin-bottom:24px;
    font-weight:700;
    color:#d90000;
    letter-spacing:1.5px;
}

.back-btn{
    width:100%;
    height:48px;
    background:#fff;
    color:#165DFF;
    border:1px solid #165DFF;
    border-radius:14px;
    font-size:16px;
    margin-top:20px;
    cursor:pointer;
    transition:all 0.3s;
}
.back-btn:hover{
    background:#f0f7ff;
}

.info-table{
    border:1px solid rgba(229,229,229,0.8);
    border-radius:16px;
    padding:24px;
    background:#fff;
    position:relative;
}
.info-row{
    display:flex;
    padding:14px 0;
    border-bottom:1px solid #f0f0f0;
    font-size:17px;
}
.info-row:last-child{
    border-bottom:none;
}
.info-label{
    width:120px;
    color:#555;
    font-weight:500;
}
.info-value{
    color:#222;
    flex:1;
    font-weight:500;
}

.pass-seal{
    position:absolute;
    top:-15px;
    right:-15px;
    width:100px;
    height:100px;
    border:3px solid #999;
    border-radius:50%;
    color:#999;
    font-size:18px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    transform:rotate(12deg);
    z-index:99;
    background:#fff;
    transition: all 0.6s ease;
}
.pass-seal.success{
    border-color: #00b578;
    color: #00b578;
    transform: rotate(0deg) scale(1.05);
}

.step-box{
    margin-top:35px;
    position:relative;
}
.step-box::before{
    content:"";
    position:absolute;
    top:12px;
    left:0;
    right:0;
    height:4px;
    background:#e0e0e0;
    border-radius:2px;
    z-index:1;
}
#progressBar{
    position:absolute;
    top:12px;
    left:0;
    height:4px;
    background:#165DFF;
    border-radius:2px;
    z-index:2;
    transition:width 0.6s ease;
}
#progressBar.success{
    background: #00b578;
}
.step-list{
    display:flex;
    justify-content:space-between;
    position:relative;
    z-index:3;
}
.step-item{
    text-align:center;
    width:20%;
}
.step-dot{
    width:20px;
    height:20px;
    border-radius:50%;
    background:#e0e0e0;
    margin:0 auto 8px;
    transition:background 0.3s ease;
}
.step-dot.active{
    background:#165DFF;
}
.step-dot.done{
    background:#00b578;
}
.step-time{
    font-size:12px;
    color:#666;
    margin-bottom:4px;
    min-height: 18px;
}
.step-text{
    font-size:13px;
    color:#666;
    font-weight:500;
    line-height: 1.3;
}
.step-item.active .step-text{
    color:#165DFF;
    font-weight:bold;
}
.step-item.done .step-text{
    color:#00b578;
    font-weight:bold;
}

.reminder{
    text-align:center;
    margin-top:22px;
    font-size:14px;
    color:#ff3333;
    font-weight:500;
    line-height: 1.5;
}
.countdown{
    text-align:center;
    margin-top:10px;
    font-size:15px;
    color:#0066cc;
    font-weight:bold;
    display: none;
}
</style>
</head>

<body>

<div class="card" id="formPage">
    <div class="header">
        <h2>消防设施操作员内部报名资质审核</h2>
    </div>
    <div class="form-body">
        <div class="form-item">
            <label>姓名</label>
            <input id="name" placeholder="请输入姓名" required>
        </div>
        <div class="form-item">
            <label>身份证号</label>
            <input id="idcard" placeholder="请输入身份证号" required>
        </div>
        <div class="form-item">
            <label>联系电话</label>
            <input id="phone" placeholder="请输入手机号" required>
        </div>
        <div class="form-item">
            <label>报考地区</label>
            <input id="area" placeholder="请输入报考地区" required>
        </div>
        <div class="form-item">
            <label>户籍地址</label>
            <input id="addr" placeholder="请输入户籍地址" required>
        </div>
        <div class="form-item">
            <label>报考方向</label>
            <select id="direction" required>
                <option value="">请选择报考方向</option>
                <option value="中级监控+中级维保">中级监控+中级维保</option>
                <option value="中级维保">中级维保</option>
                <option value="中级监控">中级监控</option>
                <option value="初级监控">初级监控</option>
            </select>
        </div>
        <button class="submit-btn" onclick="createResult()">提交生成审核单</button>
    </div>
</div>

<div class="card" id="resultPage">
    <div class="result-body">
        <div class="result-title">消防设施操作员内部报名资质审核</div>
        <div class="info-table">
            <div class="pass-seal" id="seal">审核中</div>
            <div class="info-row"><span class="info-label">姓名</span><span id="showName" class="info-value"></span></div>
            <div class="info-row"><span class="info-label">身份证号</span><span id="showIdcard" class="info-value"></span></div>
            <div class="info-row"><span class="info-label">联系电话</span><span id="showPhone" class="info-value"></span></div>
            <div class="info-row"><span class="info-label">报考地区</span><span id="showArea" class="info-value"></span></div>
            <div class="info-row"><span class="info-label">户籍地址</span><span id="showAddr" class="info-value"></span></div>
            <div class="info-row"><span class="info-label">报考方向</span><span id="showDirection" class="info-value"></span></div>
            <div class="info-row"><span class="info-label">审核编号</span><span id="showCode" class="info-value"></span></div>
        </div>

        <div class="step-box">
            <div id="progressBar"></div>
            <div class="step-list">
                <div class="step-item" id="step1">
                    <div class="step-dot"></div>
                    <div class="step-time" id="time1"></div>
                    <div class="step-text">系统预审核通过</div>
                </div>
                <div class="step-item" id="step2">
                    <div class="step-dot"></div>
                    <div class="step-time" id="time2"></div>
                    <div class="step-text">资料初审通过</div>
                </div>
                <div class="step-item" id="step3">
                    <div class="step-dot"></div>
                    <div class="step-time" id="time3"></div>
                    <div class="step-text">学员资料上传完毕</div>
                </div>
                <div class="step-item" id="step4">
                    <div class="step-dot"></div>
                    <div class="step-time" id="time4"></div>
                    <div class="step-text">内部报名资质审核录入完成</div>
                </div>
            </div>
        </div>

        <div class="reminder">
           请注意：该审核结果仅保留2小时，逾期需重新提交审核！
        </div>
        <div class="countdown" id="countdownText">
            资料时效倒计时：01:59:59
        </div>

        <button class="back-btn" onclick="goBack()">← 返回重新填写</button>
    </div>
</div>

<script>
function makeCode(){
    const s="ABCDEFGHJKLMNPQRSTWXYZ23456789";
    let c="";
    for(let i=0;i<10;i++){
        c+=s[Math.floor(Math.random()*s.length)];
    }
    return c;
}

function getTime(){
    const d=new Date();
    const h=String(d.getHours()).padStart(2,'0');
    const m=String(d.getMinutes()).padStart(2,'0');
    const s=String(d.getSeconds()).padStart(2,'0');
    return h+":"+m+":"+s;
}

let countdownTimer;

function startCountdown(){
    document.getElementById("countdownText").style.display = "block";
    let total = 2 * 60 * 60;
    clearInterval(countdownTimer);
    
    countdownTimer=setInterval(()=>{
        total--;
        if(total<=0){
            clearInterval(countdownTimer);
            document.getElementById("countdownText").innerText="⚠️ 资料已过期，请重新提交审核！";
            document.getElementById("countdownText").style.color="#ff3333";
            return;
        }
        let h=Math.floor(total/3600);
        let m=Math.floor((total%3600)/60);
        let s=total%60;
        h=String(h).padStart(2,'0');
        m=String(m).padStart(2,'0');
        s=String(s).padStart(2,'0');
        document.getElementById("countdownText").innerText=`资料时效倒计时：${h}:${m}:${s}`;
    },1000);
}

function checkForm(){
    const name=document.getElementById("name").value.trim();
    const idcard=document.getElementById("idcard").value.trim();
    const phone=document.getElementById("phone").value.trim();
    const area=document.getElementById("area").value.trim();
    const addr=document.getElementById("addr").value.trim();
    const direction=document.getElementById("direction").value;
    
    if(!name||!idcard||!phone||!area||!addr||!direction){
        alert("请填写完整信息后再提交！");
        return false;
    }
    return true;
}

function goBack(){
    clearInterval(countdownTimer);
    document.getElementById("resultPage").querySelector(".result-body").style.display="none";
    document.getElementById("formPage").style.display="block";
    
    document.querySelectorAll(".step-item").forEach(item=>{
        item.classList.remove("active","done");
        item.querySelector(".step-dot").classList.remove("active","done");
    });
    document.getElementById("progressBar").style.width="0%";
    document.getElementById("progressBar").classList.remove("success");
    document.getElementById("seal").innerText="审核中";
    document.getElementById("seal").classList.remove("success");
    document.getElementById("countdownText").style.display="none";
}

function createResult(){
    if(!checkForm()) return;
    
    document.getElementById("formPage").style.display="none";
    document.querySelector(".result-body").style.display="block";

    document.getElementById("showName").innerText=document.getElementById("name").value;
    document.getElementById("showIdcard").innerText=document.getElementById("idcard").value;
    document.getElementById("showPhone").innerText=document.getElementById("phone").value;
    document.getElementById("showArea").innerText=document.getElementById("area").value;
    document.getElementById("showAddr").innerText=document.getElementById("addr").value;
    document.getElementById("showDirection").innerText=document.getElementById("direction").value;
    document.getElementById("showCode").innerText=makeCode();

    setTimeout(()=>{
        document.getElementById("time1").innerText=getTime();
        document.getElementById("step1").classList.add("active");
        document.getElementById("step1").querySelector(".step-dot").classList.add("active");
        document.getElementById("progressBar").style.width="25%";
    },5000);

    setTimeout(()=>{
        document.getElementById("step1").classList.replace("active","done");
        document.getElementById("step1").querySelector(".step-dot").classList.replace("active","done");
        document.getElementById("time2").innerText=getTime();
        document.getElementById("step2").classList.add("active");
        document.getElementById("step2").querySelector(".step-dot").classList.add("active");
        document.getElementById("progressBar").style.width="50%";
    },17000);

    setTimeout(()=>{
        document.getElementById("step2").classList.replace("active","done");
        document.getElementById("step2").querySelector(".step-dot").classList.replace("active","done");
        document.getElementById("time3").innerText=getTime();
        document.getElementById("step3").classList.add("active");
        document.getElementById("step3").querySelector(".step-dot").classList.add("active");
        document.getElementById("progressBar").style.width="75%";
    },21000);

    setTimeout(()=>{
        document.getElementById("step3").classList.replace("active","done");
        document.getElementById("step3").querySelector(".step-dot").classList.replace("active","done");
        document.getElementById("time4").innerText=getTime();
        document.getElementById("step4").classList.add("done");
        document.getElementById("step4").querySelector(".step-dot").classList.add("done");
        document.getElementById("progressBar").style.width="100%";
        document.getElementById("progressBar").classList.add("success");
        
        const seal=document.getElementById("seal");
        seal.innerText="审核通过";
        seal.classList.add("success");

        startCountdown();
    },28000);
}
</script>
</body>
</html>
